name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: master

      - name: Build (Debug)
        run: zig build

      - name: Run tests
        run: zig build test

      - name: Build (ReleaseFast)
        run: zig build -Doptimize=ReleaseFast

      - name: Smoke test
        run: |
          ./zig-out/bin/zeal --version
          ./zig-out/bin/zeal --help
          ./zig-out/bin/zeal 'FROM testdata/app.json WHERE level = "error"'
          ./zig-out/bin/zeal --format json 'FROM testdata/app.json WHERE level = "error" SHOW COUNT'
          ./zig-out/bin/zeal --explain 'FROM testdata/app.json WHERE level = "error" WITHIN 5s OF level = "warn" GROUP BY request_id'

  lint:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: master

      - name: Check formatting
        run: zig fmt --check src/

  cross-compile:
    name: Cross-compile
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-linux-musl
          - aarch64-linux-musl
          - x86_64-macos
          - aarch64-macos
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: master

      - name: Build for ${{ matrix.target }}
        run: zig build -Doptimize=ReleaseFast -Dtarget=${{ matrix.target }}

      - name: Check binary exists
        run: ls -lh zig-out/bin/zeal
