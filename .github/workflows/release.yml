name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-linux-musl
            os: ubuntu-latest
            artifact: zeal-x86_64-linux
          - target: aarch64-linux-musl
            os: ubuntu-latest
            artifact: zeal-aarch64-linux
          - target: x86_64-macos
            os: macos-latest
            artifact: zeal-x86_64-macos
          - target: aarch64-macos
            os: macos-latest
            artifact: zeal-aarch64-macos

    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: master

      - name: Build
        run: zig build -Doptimize=ReleaseFast -Dtarget=${{ matrix.target }}

      - name: Package binary
        run: |
          mkdir -p dist
          cp zig-out/bin/zeal dist/${{ matrix.artifact }}
          chmod +x dist/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Prepare release assets
        run: |
          mkdir -p release
          # Flatten artifact directories
          for dir in dist/*/; do
            cp "$dir"* release/ 2>/dev/null || true
          done
          # Create tarballs
          cd release
          for bin in zeal-*; do
            tar czf "${bin}.tar.gz" "$bin"
          done
          # Generate checksums
          sha256sum *.tar.gz > checksums.txt
          cat checksums.txt
          ls -lh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*.tar.gz
            release/checksums.txt
